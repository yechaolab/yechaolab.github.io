<h2 data-zh="治理科学" data-en="Governance Science">治理科学</h2>
<p data-zh="探索多尺度、多主体的治理机制与实践路径，涵盖城乡治理、气候治理与数字化治理三大核心领域。研究关注制度设计、政策创新与空间治理的交叉议题，致力于为全球治理实践提供理论支撑与路径参考。" data-en="Exploring multi-scale, multi-actor governance mechanisms, covering urban-rural, climate, and digital governance.">探索多尺度、多主体的治理机制与实践路径，涵盖城乡治理、气候治理与数字化治理三大核心领域。研究关注制度设计、政策创新与空间治理的交叉议题，致力于为全球治理实践提供理论支撑与路径参考。</p>
